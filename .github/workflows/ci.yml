name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  geometry:
    name: geometry service (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/geometry
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: pytest -q

  api:
    name: orchestrator (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet build api/Api.csproj -c Release

  revit:
    name: RevitBuilder + AddIn (build)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      # DesignAutomation is excluded: it needs DesignAutomationBridge.dll (Revit DA SDK).
      - run: dotnet build revit/RevitBuilder/RevitBuilder.csproj -c Release
      - run: dotnet build revit/AddIn/AddIn.csproj -c Release

  web:
    name: web (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build
